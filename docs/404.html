<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found — Approve The Move</title>
  <meta name="description" content="The page you're looking for doesn't exist.">
  <meta name="theme-color" content="#0a0a0a">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="stylesheet" href="/css/style.css">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Page Not Found — Approve The Move">
  <meta property="og:description" content="The page you're looking for doesn't exist.">
  <meta property="og:image" content="https://approvethemove.com/og-image.svg">
  <meta name="twitter:card" content="summary_large_image">
  <style>
    .error-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 24px;
    }
    .error-code {
      font-size: clamp(6rem, 20vw, 12rem);
      font-weight: 900;
      background: linear-gradient(135deg, var(--accent), #7c3aed);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
      letter-spacing: -0.05em;
      margin-bottom: 20px;
    }
    .error-page h1 {
      font-size: clamp(1.5rem, 4vw, 2.2rem);
      font-weight: 800;
      margin-bottom: 16px;
      letter-spacing: -0.02em;
    }
    .error-page p {
      color: var(--text-muted);
      font-size: 1.1rem;
      max-width: 480px;
      margin: 0 auto 32px;
      line-height: 1.6;
    }
    .error-actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 24px;
      border-radius: 100px;
      font-size: 0.95rem;
      font-weight: 600;
      transition: all 0.25s ease;
      border: 1px solid var(--border);
    }
    .btn-primary {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }
    .btn-primary:hover {
      opacity: 0.9;
      transform: translateY(-1px);
    }
    .btn-secondary {
      background: var(--bg-card);
      color: var(--text);
    }
    .btn-secondary:hover {
      border-color: var(--accent);
      opacity: 1;
    }
  </style>
</head>
<body>

  <nav class="nav">
    <div class="container">
      <a href="/" class="nav-brand"><img src="/logo.svg" alt="" class="nav-logo"><span>Approve The Move</span></a>
      <button class="nav-hamburger" onclick="toggleNav()" aria-label="Menu">&#9776;</button>
      <ul class="nav-links">
        <li><a href="/#apps">Apps</a></li>
        <li><a href="/#about">About</a></li>
        <li><a href="/privacy/">Privacy</a></li>
        <li><button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle theme"></button></li>
      </ul>
    </div>
  </nav>

  <div class="error-page">
    <div class="error-code">404</div>
    <h1>Page Not Found</h1>
    <p>The page you're looking for doesn't exist or has been moved. Let's get you back on track.</p>
    <div class="error-actions">
      <a href="/" class="btn btn-primary">Go Home</a>
      <a href="/#apps" class="btn btn-secondary">Browse Apps</a>
    </div>
  </div>

  <script src="/js/main.js"></script>
</body>
</html>
