<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="splitBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff9500"/>
      <stop offset="100%" stop-color="#ff3b30"/>
    </linearGradient>
    <linearGradient id="splitCoin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#fff4e0"/>
    </linearGradient>
    <filter id="splitShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="0" dy="6" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="224" fill="url(#splitBg)"/>

  <!-- Two overlapping circles representing shared money -->
  <g filter="url(#splitShadow)">
    <circle cx="400" cy="512" r="230" fill="url(#splitCoin)" opacity="0.92"/>
    <circle cx="624" cy="512" r="230" fill="#ffffff"/>
  </g>

  <!-- Dollar sign in the center overlap -->
  <text x="512" y="615" font-size="280" font-weight="900" fill="#ff3b30" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif">$</text>
</svg>
